name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run generate:data
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://eip-explorer.vercel.app
